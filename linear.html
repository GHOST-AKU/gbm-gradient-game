<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>线性回归训练场</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=26" />
  </head>
  <body class="linear-page compact-lab-page">
    <nav class="lab-switch" aria-label="切换训练场">
      <a href="./index.html">首页</a>
      <a href="./gbm.html">GBM 训练场</a>
      <a href="./svm.html">SVM 训练场</a>
      <a href="./kmeans.html">K-Means 训练场</a>
      <a href="./tree.html">决策树训练场</a>
      <a href="./linear.html" class="active">线性回归</a>
      <a href="./logistic.html">逻辑回归</a>
      <a href="./nn.html">神经网络</a>
      <a href="./forest.html">随机森林</a>
    </nav>
    <main class="game-shell">
      <section class="stage" aria-label="线性回归交互画布">
        <div class="topbar">
          <div class="title-group">
            <p class="eyebrow">Line Fit Lab</p>
            <h1>线性回归训练场</h1>
            <p id="levelSubtitle" class="subtitle">用一条直线压低所有点到模型的残差平方。</p>
          </div>
          <div class="meter-row" aria-live="polite">
            <div class="score-card"><span>拟合得分</span><strong id="scoreValue">--</strong></div>
            <div class="score-card compact"><span>轮次</span><strong id="roundValue">0</strong></div>
          </div>
        </div>
        <div id="toast" class="toast" role="status">先观察散点，再训练一步。</div>
        <div class="canvas-wrap"><canvas id="chart" width="980" height="520"></canvas></div>
        <div id="chartNote" class="chart-note latest-note fx-crt" role="status">
          <span id="latestText">未训练：直线从水平线开始，等待梯度下降。</span>
          <span id="bestLabel">等待开始</span>
        </div>
        <div class="legend" aria-label="图例">
          <span><i class="dot target"></i>样本点</span>
          <span><i class="line prediction"></i>回归直线</span>
          <span><i class="bar residual"></i>残差</span>
        </div>
      </section>
      <aside class="control-panel" aria-label="游戏控制">
        <section class="panel-block mission-card">
          <div class="panel-heading"><h2>关卡</h2><span id="targetLabel">目标 --</span></div>
          <div id="levelPicker" class="choice-grid"></div>
          <p id="missionText">让蓝色直线穿过点云中心，残差线越短越好。</p>
          <div class="progress-track" aria-hidden="true"><div id="progressFill"></div></div>
        </section>
        <section class="panel-block view-card">
          <h2>观察方式</h2>
          <div id="viewPicker" class="segmented">
            <button type="button" data-view="fit" class="active">拟合</button>
            <button type="button" data-view="residual">残差</button>
            <button type="button" data-view="gradient">梯度</button>
            <button type="button" data-view="loss">损失</button>
          </div>
        </section>
        <section class="panel-block controls-card">
          <h2>训练控制</h2>
          <label class="slider-row" for="learningRate"><span>学习率</span><strong id="rateLabel">0.25</strong></label>
          <input id="learningRate" type="range" min="0.05" max="0.8" value="0.25" step="0.05" />
          <label class="slider-row" for="batchSize"><span>每轮步数</span><strong id="batchLabel">3</strong></label>
          <input id="batchSize" type="range" min="1" max="20" value="3" step="1" />
          <div class="button-grid">
            <button id="stepBtn" type="button">训练一步</button>
            <button id="autoBtn" type="button" class="secondary">自动训练</button>
            <button id="undoBtn" type="button" class="secondary">撤回一步</button>
            <button id="resetBtn" type="button" class="secondary">重置</button>
            <button id="nextLevelBtn" type="button" class="secondary wide">下一关</button>
          </div>
        </section>
        <section class="panel-block boundary-card chart-data-card">
          <div class="panel-heading"><h2>回归数据</h2><span id="formulaLabel">y = 0x + 0</span></div>
          <div class="boundary-stats">
            <span><b id="mseLabel">--</b><small>MSE</small></span>
            <span><b id="slopeLabel">0.00</b><small>斜率 w</small></span>
            <span><b id="biasLabel">0.00</b><small>截距 b</small></span>
            <span><b id="gradLabel">--</b><small>梯度</small></span>
            <span><b id="samplesLabel">0</b><small>样本</small></span>
            <span><b id="bestScoreLabel">--</b><small>最佳</small></span>
          </div>
        </section>
      </aside>
    </main>
    <script src="./models/linear-model.js?v=1"></script>
    <script src="./lab-runtime.js?v=1"></script>
    <script src="./linear.js?v=3"></script>
  </body>
</html>
