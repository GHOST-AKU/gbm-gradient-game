<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K-Means 聚类训练场</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=26" />
  </head>
  <body class="kmeans-page">
    <nav class="lab-switch" aria-label="切换训练场">
      <a href="./index.html">首页</a>
      <a href="./gbm.html">GBM 训练场</a>
      <a href="./svm.html">SVM 训练场</a>
      <a href="./kmeans.html" class="active">K-Means 训练场</a>
      <a href="./tree.html">决策树训练场</a>
      <a href="./linear.html">线性回归</a>
      <a href="./logistic.html">逻辑回归</a>
      <a href="./nn.html">神经网络</a>
      <a href="./forest.html">随机森林</a>
    </nav>

    <main class="game-shell">
      <section class="stage" aria-label="K-Means 聚类交互画布">
        <div class="topbar">
          <div class="title-group">
            <p class="eyebrow">Cluster Arcade</p>
            <h1>K-Means 聚类训练场</h1>
            <p id="levelSubtitle" class="subtitle">拖动质心，占住样本地盘，再让质心迭代回到族群中心。</p>
          </div>
          <div class="meter-row" aria-live="polite">
            <div class="score-card">
              <span>聚合得分</span>
              <strong id="mseValue">--</strong>
            </div>
            <div class="score-card compact">
              <span>轮次</span>
              <strong id="roundValue">0</strong>
            </div>
          </div>
        </div>

        <div id="toast" class="toast" role="status">先拖动质心，或直接迭代一步。</div>

        <div class="canvas-wrap">
          <canvas id="chart" width="980" height="520"></canvas>
        </div>

        <div id="chartNote" class="chart-note latest-note fx-crt" role="status">
          <span id="latestText">未迭代：每个样本会归到最近的质心旗下。</span>
          <span id="bestLabel">等待开始</span>
        </div>

        <div class="legend" aria-label="图例">
          <span><i class="sample-key positive-key"></i>样本点</span>
          <span><i class="centroid-key"></i>质心</span>
          <span><i class="line assignment-key"></i>归属线</span>
          <span><i class="line boundary-key"></i>地盘边界</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="游戏控制">
        <section class="panel-block mission-card">
          <div class="panel-heading">
            <h2>关卡</h2>
            <span id="targetLabel">目标 --</span>
          </div>
          <div id="levelPicker" class="choice-grid" aria-label="选择关卡"></div>
          <p id="missionText">让每个质心站到一群样本的中心，压低簇内距离。</p>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill"></div>
          </div>
        </section>

        <section class="panel-block view-card">
          <h2>观察方式</h2>
          <div id="viewPicker" class="segmented" aria-label="选择观察方式">
            <button type="button" data-view="territory" class="active">地盘</button>
            <button type="button" data-view="distance">距离</button>
            <button type="button" data-view="motion">移动</button>
            <button type="button" data-view="loss">损失</button>
          </div>
        </section>

        <section class="panel-block controls-card">
          <h2>训练控制</h2>
          <label class="slider-row" for="clusterCount">
            <span>K 值</span>
            <strong id="clusterLabel">3</strong>
          </label>
          <input id="clusterCount" type="range" min="2" max="5" value="3" step="1" />

          <label class="slider-row" for="moveRate">
            <span>质心步幅</span>
            <strong id="rateLabel">1.00</strong>
          </label>
          <input id="moveRate" type="range" min="0.25" max="1" value="1" step="0.25" />

          <div class="button-grid">
            <button id="stepBtn" type="button">迭代一步</button>
            <button id="autoBtn" type="button" class="secondary">自动迭代</button>
            <button id="undoBtn" type="button" class="secondary">撤回一步</button>
            <button id="resetBtn" type="button" class="secondary">重置</button>
            <button id="nextLevelBtn" type="button" class="secondary wide">下一关</button>
          </div>
        </section>

        <section class="panel-block boundary-card chart-data-card" aria-label="当前聚类数据">
          <div class="panel-heading">
            <h2>聚类数据</h2>
            <span id="formulaLabel">等待迭代</span>
          </div>
          <div class="boundary-stats">
            <span><b id="inertiaLabel">--</b><small>簇内距离</small></span>
            <span><b id="movementLabel">--</b><small>质心移动</small></span>
            <span><b id="emptyLabel">0</b><small>空簇</small></span>
            <span><b id="stableLabel">--</b><small>稳定度</small></span>
            <span><b id="kLabel">3</b><small>K</small></span>
            <span><b id="bestScoreLabel">--</b><small>最佳</small></span>
          </div>
        </section>
      </aside>
    </main>

    <script src="./kmeans.js?v=2"></script>
  </body>
</html>
