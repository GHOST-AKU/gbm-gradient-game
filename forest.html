<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>随机森林训练场</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=26" />
  </head>
  <body class="forest-page compact-lab-page">
    <nav class="lab-switch" aria-label="切换训练场">
      <a href="./index.html">首页</a>
      <a href="./gbm.html">GBM 训练场</a>
      <a href="./svm.html">SVM 训练场</a>
      <a href="./kmeans.html">K-Means 训练场</a>
      <a href="./tree.html">决策树训练场</a>
      <a href="./linear.html">线性回归</a>
      <a href="./logistic.html">逻辑回归</a>
      <a href="./nn.html">神经网络</a>
      <a href="./forest.html" class="active">随机森林</a>
    </nav>
    <main class="game-shell">
      <section class="stage" aria-label="随机森林交互画布">
        <div class="topbar">
          <div class="title-group">
            <p class="eyebrow">Forest Vote</p>
            <h1>随机森林训练场</h1>
            <p id="levelSubtitle" class="subtitle">每棵树看一部分样本和特征，最后一起投票。</p>
          </div>
          <div class="meter-row" aria-live="polite">
            <div class="score-card"><span>投票得分</span><strong id="scoreValue">--</strong></div>
            <div class="score-card compact"><span>树数</span><strong id="roundValue">0</strong></div>
          </div>
        </div>
        <div id="toast" class="toast" role="status">种下一棵随机树，看森林投票如何稳定边界。</div>
        <div class="canvas-wrap"><canvas id="chart" width="980" height="520"></canvas></div>
        <div id="chartNote" class="chart-note latest-note fx-crt" role="status">
          <span id="latestText">未训练：森林里还没有树。</span>
          <span id="bestLabel">等待开始</span>
        </div>
        <div class="legend" aria-label="图例">
          <span><i class="sample-key positive-key"></i>正类</span>
          <span><i class="sample-key negative-key"></i>负类</span>
          <span><i class="line boundary-key"></i>投票边界</span>
          <span><i class="support-key"></i>当前树关注点</span>
        </div>
      </section>
      <aside class="control-panel" aria-label="游戏控制">
        <section class="panel-block mission-card">
          <div class="panel-heading"><h2>关卡</h2><span id="targetLabel">目标 --</span></div>
          <div id="levelPicker" class="choice-grid"></div>
          <p id="missionText">让多棵小树并联投票，减少单棵树的偶然错误。</p>
          <div class="progress-track" aria-hidden="true"><div id="progressFill"></div></div>
        </section>
        <section class="panel-block view-card">
          <h2>观察方式</h2>
          <div id="viewPicker" class="segmented">
            <button type="button" data-view="vote" class="active">投票</button>
            <button type="button" data-view="trees">树</button>
            <button type="button" data-view="margin">信心</button>
            <button type="button" data-view="errors">错分</button>
          </div>
        </section>
        <section class="panel-block controls-card">
          <h2>训练控制</h2>
          <label class="slider-row" for="maxDepth"><span>树深度</span><strong id="depthLabel">3</strong></label>
          <input id="maxDepth" type="range" min="1" max="5" value="3" step="1" />
          <label class="slider-row" for="featureRate"><span>特征采样</span><strong id="featureLabel">1</strong></label>
          <input id="featureRate" type="range" min="1" max="2" value="1" step="1" />
          <div class="button-grid">
            <button id="stepBtn" type="button">种一棵树</button>
            <button id="autoBtn" type="button" class="secondary">自动造林</button>
            <button id="undoBtn" type="button" class="secondary">砍掉一棵</button>
            <button id="resetBtn" type="button" class="secondary">重置</button>
            <button id="nextLevelBtn" type="button" class="secondary wide">下一关</button>
          </div>
        </section>
        <section class="panel-block boundary-card chart-data-card">
          <div class="panel-heading"><h2>森林数据</h2><span id="formulaLabel">多数投票</span></div>
          <div class="boundary-stats">
            <span><b id="accuracyLabel">--</b><small>正确率</small></span>
            <span><b id="marginLabel">--</b><small>投票信心</small></span>
            <span><b id="treeLabel">0</b><small>树</small></span>
            <span><b id="oobLabel">--</b><small>袋外估计</small></span>
            <span><b id="depthStatLabel">3</b><small>深度</small></span>
            <span><b id="bestScoreLabel">--</b><small>最佳</small></span>
          </div>
        </section>
      </aside>
    </main>
    <script src="./forest.js?v=1"></script>
  </body>
</html>
