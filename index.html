<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>梯度提升机训练场</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=15" />
  </head>
  <body>
    <nav class="lab-switch" aria-label="切换训练场">
      <a href="./index.html" class="active">GBM 训练场</a>
      <a href="./svm.html">SVM 训练场</a>
    </nav>
    <main class="game-shell">
      <section class="stage" aria-label="梯度提升机交互画布">
        <div class="topbar">
          <div class="title-group">
            <p class="eyebrow">Boost Lab</p>
            <h1>梯度提升机训练场</h1>
            <p id="levelSubtitle" class="subtitle">每一棵小树都只追上一轮没解释掉的残差。</p>
          </div>
          <div class="meter-row" aria-live="polite">
            <div class="score-card">
              <span>均方误差</span>
              <strong id="mseValue">--</strong>
            </div>
            <div class="score-card compact">
              <span>轮次</span>
              <strong id="roundValue">0</strong>
            </div>
          </div>
        </div>

        <div id="toast" class="toast" role="status">选择关卡和观察方式，然后训练第一棵弱树。</div>

        <div class="canvas-wrap">
          <canvas id="chart" width="980" height="520"></canvas>
        </div>

        <div class="legend" aria-label="图例">
          <span><i class="dot target"></i>真实目标</span>
          <span><i class="line prediction"></i>当前模型</span>
          <span><i class="bar residual"></i>残差方向</span>
          <span><i class="line learner"></i>本轮弱学习器</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="游戏控制">
        <section class="panel-block mission-card">
          <div class="panel-heading">
            <h2>关卡</h2>
            <span id="targetLabel">目标 --</span>
          </div>
          <div id="levelPicker" class="choice-grid" aria-label="选择关卡"></div>
          <p id="missionText">把蓝色模型曲线推近黄色目标点。红线越短，说明残差越小。</p>
          <div class="progress-track" aria-hidden="true">
            <div id="progressFill"></div>
          </div>
        </section>

        <section class="panel-block view-card">
          <h2>观察方式</h2>
          <div id="viewPicker" class="segmented" aria-label="选择观察方式">
            <button type="button" data-view="model" class="active">模型</button>
            <button type="button" data-view="residual">残差</button>
            <button type="button" data-view="learner">弱树</button>
            <button type="button" data-view="loss">误差</button>
          </div>
        </section>

        <section class="panel-block controls-card">
          <h2>训练控制</h2>
          <label class="slider-row" for="learningRate">
            <span>学习率</span>
            <strong id="rateLabel">0.30</strong>
          </label>
          <input id="learningRate" type="range" min="0.05" max="0.8" value="0.3" step="0.05" />

          <label class="slider-row" for="treeDepth">
            <span>树桩复杂度</span>
            <strong id="depthLabel">3 段</strong>
          </label>
          <input id="treeDepth" type="range" min="1" max="8" value="3" step="1" />

          <div class="button-grid">
            <button id="stepBtn" type="button">训练下一棵</button>
            <button id="autoBtn" type="button" class="secondary">自动训练</button>
            <button id="undoBtn" type="button" class="secondary">撤回一轮</button>
            <button id="resetBtn" type="button" class="secondary">重置</button>
            <button id="nextLevelBtn" type="button" class="secondary wide">下一关</button>
          </div>
        </section>

        <section class="panel-block log-card">
          <div class="panel-heading">
            <h2>训练记录</h2>
            <button id="expandLogBtn" class="mini-button" type="button" aria-haspopup="dialog">全屏</button>
            <span id="bestLabel">等待开始</span>
          </div>
          <p id="emptyLog" class="empty-log">还没有训练。点一次“训练下一棵”，这里会记录每棵弱树让误差下降了多少。</p>
          <ol id="roundLog" class="round-log"></ol>
        </section>
      </aside>
    </main>

    <section id="logOverlay" class="log-overlay" role="dialog" aria-modal="true" aria-labelledby="logOverlayTitle" hidden>
      <div class="log-modal">
        <div class="modal-heading">
          <div>
            <p class="eyebrow">Training Log</p>
            <h2 id="logOverlayTitle">训练记录</h2>
          </div>
          <button id="closeLogBtn" class="mini-button danger" type="button">关闭</button>
        </div>
        <div class="modal-stats">
          <span id="modalRoundLabel">轮次 0</span>
          <span id="modalBestLabel">最佳 --</span>
          <span id="modalLevelLabel">关卡 --</span>
        </div>
        <p id="modalEmptyLog" class="empty-log">还没有训练记录。</p>
        <ol id="fullRoundLog" class="full-round-log"></ol>
      </div>
    </section>

    <script src="./app.js?v=10"></script>
  </body>
</html>
